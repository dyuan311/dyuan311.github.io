baseURL: "https://dyuan311.github.io/"
defaultContentLanguage: "zh"
locale: "zh-cn"
title: "Dong's Blog"
theme: ["PaperMod"]

enableRobotsTXT: true

minify:
  minifyOutput: true

params:
  env: production
  description: "AI, mathematics, and research notes."
  disableSpecial1stPost: true
  defaultTheme: auto
  ShowReadingTime: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  assets:
    disableHLJS: true
    favicon: "/favicon.png"
    favicon16x16: "/favicon.png"
    favicon32x32: "/favicon.png"
    apple_touch_icon: "/favicon.png"

menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 10
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 20
    - identifier: archive
      name: 归档
      url: /archives/
      weight: 30

markup:
  highlight:
    codeFences: true
    guessSyntax: true
    lineNos: false
    noClasses: false
    style: github

caches:
  images:
    dir: :cacheDir/images
